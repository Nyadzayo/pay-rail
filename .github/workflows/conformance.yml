name: Provider Conformance Tests

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  conformance:
    name: Provider Sandbox Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run conformance tests
        run: cargo test -p payrail-adapters -- conformance
        env:
          PEACH_SANDBOX_API_KEY: ${{ secrets.PEACH_SANDBOX_API_KEY }}
          PEACH_SANDBOX_ENTITY_ID: ${{ secrets.PEACH_SANDBOX_ENTITY_ID }}
          STARTBUTTON_SANDBOX_API_KEY: ${{ secrets.STARTBUTTON_SANDBOX_API_KEY }}
