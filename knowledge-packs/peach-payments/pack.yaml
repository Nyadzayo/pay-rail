metadata:
  name: peach_payments
  display_name: Peach Payments
  version: 1.0.0
  base_url: https://api-v2.peachpayments.com
  sandbox_url: https://testapi-v2.peachpayments.com
  documentation_url: https://developer.peachpayments.com
  checkout_url: https://secure.peachpayments.com
  checkout_sandbox_url: https://testsecure.peachpayments.com

endpoints:
  - value:
      url: /payments
      method: POST
      parameters:
        - entityId
        - amount
        - currency
        - paymentBrand
        - paymentType
      response_schema: '{"id": "string", "result": {"code": "string", "description": "string"}, "buildNumber": "string"}'
      description: Create a payment (pre-authorization, debit, or credit)
    confidence_score: 0.95
    source: sandbox_test
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      url: /payments/{id}
      method: GET
      parameters:
        - entityId
      response_schema: '{"id": "string", "result": {"code": "string", "description": "string"}, "amount": "string", "currency": "string"}'
      description: Query payment status by checkout ID
    confidence_score: 0.95
    source: sandbox_test
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      url: /payments/{id}
      method: POST
      parameters:
        - entityId
        - amount
        - currency
        - paymentType
      response_schema: '{"id": "string", "result": {"code": "string", "description": "string"}}'
      description: Capture, refund, or reversal on existing payment (paymentType=CP/RF/RV)
    confidence_score: 0.95
    source: sandbox_test
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      url: /checkouts
      method: POST
      parameters:
        - entityId
        - amount
        - currency
        - paymentType
      response_schema: '{"id": "string", "result": {"code": "string", "description": "string"}}'
      description: Create checkout for hosted payment page with 3D Secure support
    confidence_score: 0.92
    source: official_docs
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      url: /payments/{id}/refund
      method: POST
      parameters:
        - entityId
        - amount
        - currency
        - paymentType
      response_schema: '{"id": "string", "result": {"code": "string", "description": "string"}}'
      description: Process a refund on a captured payment
    confidence_score: 0.93
    source: sandbox_test
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

webhooks:
  - value:
      event_name: charge.succeeded
      payload_schema: '{"type": "string", "payload": {"id": "string", "result": {"code": "string"}, "amount": "string"}}'
      trigger_conditions: When a charge (debit or pre-authorization) is processed successfully
      description: Successful charge notification
    confidence_score: 0.95
    source: sandbox_test
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      event_name: charge.failed
      payload_schema: '{"type": "string", "payload": {"id": "string", "result": {"code": "string", "description": "string"}}}'
      trigger_conditions: When a charge fails due to decline or error
      description: Failed charge notification
    confidence_score: 0.95
    source: sandbox_test
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      event_name: capture.succeeded
      payload_schema: '{"type": "string", "payload": {"id": "string", "referencedId": "string", "amount": "string"}}'
      trigger_conditions: When a capture on pre-authorized payment succeeds
      description: Successful capture notification
    confidence_score: 0.95
    source: sandbox_test
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      event_name: refund.succeeded
      payload_schema: '{"type": "string", "payload": {"id": "string", "referencedId": "string", "amount": "string"}}'
      trigger_conditions: When a refund is processed successfully
      description: Successful refund notification
    confidence_score: 0.92
    source: official_docs
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      event_name: reversal.succeeded
      payload_schema: '{"type": "string", "payload": {"id": "string", "referencedId": "string"}}'
      trigger_conditions: When a payment reversal (void) succeeds
      description: Successful reversal notification
    confidence_score: 0.90
    source: official_docs
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      event_name: charge.pending
      payload_schema: '{"type": "string", "payload": {"id": "string", "result": {"code": "string"}}}'
      trigger_conditions: When a charge enters 3DS redirect or async processing
      description: Pending charge requiring customer action (3DS)
    confidence_score: 0.90
    source: sandbox_test
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

