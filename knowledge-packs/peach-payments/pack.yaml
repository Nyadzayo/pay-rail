flows:
  - value:
      name: Pre-Authorization and Capture
      steps:
        - Created
        - Authorized
        - Captured
      description: Two-step flow using PA (pre-authorization) then CP (capture)
    confidence_score: 0.95
    source: sandbox_test
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      name: Direct Debit
      steps:
        - Created
        - Captured
      description: Single-step debit (DB) that authorizes and captures atomically
    confidence_score: 0.95
    source: sandbox_test
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      name: Pre-Authorization with Reversal
      steps:
        - Created
        - Authorized
        - Voided
      description: Cancel pre-authorization using reversal (RV) before capture
    confidence_score: 0.92
    source: official_docs
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      name: Capture and Refund
      steps:
        - Created
        - Authorized
        - Captured
        - Refunded
      description: Full lifecycle with refund (RF) after capture
    confidence_score: 0.92
    source: sandbox_test
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      name: 3D Secure Flow
      steps:
        - Created
        - Pending3ds
        - Authorized
        - Captured
      description: Payment with 3DS redirect (result code 000.100.112) then completion
    confidence_score: 0.90
    source: sandbox_test
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05
