      description: "Insufficient funds in wallet for transfer"
      recovery_action: "Top up merchant wallet for the currency. Error message includes remaining balance."
    confidence_score: 0.95
    source: official_docs
    verification_date: "2026-03-10T00:00:00Z"
    decay_rate: 0.05

  - value:
      code: DAILY_LIMIT_EXCEEDED
      description: "Daily transfer limit exceeded (₦1,000,000 NGN or ~$500 equivalent)"
      recovery_action: "Wait until next day or contact Startbutton to increase limit. Error includes remaining daily allowance."
    confidence_score: 0.95
    source: official_docs
    verification_date: "2026-03-10T00:00:00Z"
    decay_rate: 0.05

  - value:
      code: INVALID_BANK_PARAMS
      description: "Missing bankCode/accountNumber pair or MNO/msisdn pair"
      recovery_action: "Provide either bankCode + accountNumber (bank transfer) or MNO + msisdn (mobile money)"
