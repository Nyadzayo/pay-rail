flows:
  # === OFFRAMP FLOWS ===
  - value:
      name: ZAR Bank Transfer Offramp
      steps:
        - Initiated
        - Pending
        - Processing
        - Successful
      description: "Offramp flow: crypto/digital → ZAR bank transfer. Requires bankCode, accountNumber, accountName. No account validation available for ZAR."
    confidence_score: 0.95
    source: official_docs
    verification_date: "2026-03-10T00:00:00Z"
    decay_rate: 0.05

  - value:
