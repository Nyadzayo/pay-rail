metadata:
  name: startbutton
  display_name: Startbutton
  version: 2.0.0
  base_url: https://api.startbutton.tech
  sandbox_url: https://api.startbutton.tech
  documentation_url: https://startbutton.gitbook.io/startbutton-product-api
  description: Pan-African payment platform — collections, transfers (payouts/offramp), payment links, recurring charges. Merchant of Record for cross-border expansion.
  authentication:
    method: bearer_token
    header: Authorization
    format: "Bearer SECRET_KEY"
    key_source: Dashboard Settings page
  supported_countries:
    - name: Nigeria
      currency: NGN
      channels: [bank_transfer, card]
    - name: Ghana
      currency: GHS
      channels: [bank_transfer, mobile_money, card]
    - name: South Africa
      currency: ZAR
      channels: [bank_transfer]
    - name: Kenya
      currency: KES
      channels: [bank_transfer, mobile_money]
    - name: Uganda
      currency: UGX
      channels: [mobile_money]
    - name: Rwanda
      currency: RWF
      channels: [mobile_money]
    - name: Tanzania
      currency: TZS
      channels: [mobile_money]
    - name: "Côte d'Ivoire"
      currency: XOF
      channels: [mobile_money]
    - name: Zambia
      currency: ZMW
      channels: [mobile_money]
  supported_currencies:
    - code: NGN
      name: Nigerian Naira
      minor_units: 2
      min_charge: 5000
    - code: GHS
      name: Ghanaian Cedi
      minor_units: 2
      min_charge: 10
    - code: ZAR
      name: South African Rand
      minor_units: 2
    - code: KES
      name: Kenyan Shilling
      minor_units: 2
    - code: UGX
      name: Ugandan Shilling
      minor_units: 0
    - code: RWF
      name: Rwandan Franc
      minor_units: 0
    - code: TZS
      name: Tanzanian Shilling
      minor_units: 2
    - code: XOF
      name: West African CFA Franc
      minor_units: 0
    - code: ZMW
      name: Zambian Kwacha
      minor_units: 2
    - code: USD
      name: US Dollar
      minor_units: 2

endpoints:
  # === TRANSFER / PAYOUT (Offramp) ===
  - value:
      url: /transaction/transfer
      method: POST
      parameters:
        - "amount (number, required) — transfer amount in minor units"
        - "currency (string, required) — NGN, GHS, ZAR, KES, UGX, RWF, TZS, XOF, ZMW"
        - "country (string, required) — full country name e.g. 'South Africa'"
        - "reference (string, optional) — 16-100 alphanumeric chars, auto-generated if omitted"
        - "webhookUrl (string, optional) — custom webhook URL for this transfer"
        - "bankCode (string, conditional) — required for bank transfers, from bank list endpoint"
        - "accountNumber (string, conditional) — required for bank transfers"
        - "accountName (string, conditional) — required for ZAR, optional for KES"
        - "MNO (string, conditional) — required for mobile money: MTN, MPESA, AIRTEL, TIGO, VODAFONE"
        - "msisdn (string, conditional) — required for mobile money, phone with country code"
        - "recipientFirstName (string, optional) — required for XOF only"
        - "recipientLastName (string, optional) — required for XOF only"
      response_schema: '{"success": true, "message": "transfer", "data": "processing"}'
      description: "Send funds to customer/vendor bank account or mobile money. ZAR payouts via bank transfer only (bankCode + accountNumber + accountName required). Mobile money requires MNO + msisdn. Reference must be 16-100 alphanumeric chars. Daily limit: ~$500 equivalent."
    confidence_score: 0.95
    source: official_docs
    verification_date: "2026-03-10T00:00:00Z"
    decay_rate: 0.05

  # === TRANSACTION STATUS ===
  - value:
      url: /transaction/status/{reference}
      method: GET
      parameters:
        - "reference (string, required) — transaction reference as path parameter"
      response_schema: '{"success": true, "message": "string", "data": {"transaction": {"_id": "string", "transType": "transfer|collection", "status": "string", "transactionReference": "string", "userTransactionReference": "string", "amount": "number", "currency": "string", "feeAmount": "number", "merchantId": "string", "createdAt": "ISO8601", "updatedAt": "ISO8601", "isRecurrent": "boolean", "recipient": {"recipientName": "string", "currency": "string", "institutionType": "string", "institutionName": "string", "institutionNumber": "string"}}, "authorizationCode": "string|null"}}'
      description: "Retrieve transaction details by reference. Works for both transfers and collections. Returns full transaction object with status, amounts, fees, and recipient details."
    confidence_score: 0.95
    source: official_docs
    verification_date: "2026-03-10T00:00:00Z"
    decay_rate: 0.05

  # === WALLET BALANCE ===
  - value:
      url: /wallet
      method: GET
      parameters: []
      response_schema: '{"success": true, "message": "string", "data": [{"_id": "string", "currency": "string", "availableBalance": "number", "ledgerBalance": "number", "createdAt": "ISO8601", "updatedAt": "ISO8601"}]}'
      description: "Get wallet balances for all enabled collection currencies. Returns availableBalance (spendable) and ledgerBalance (total including pending)."
    confidence_score: 0.95
    source: official_docs
    verification_date: "2026-03-10T00:00:00Z"
    decay_rate: 0.05

  # === PAYMENT LINKS ===
  - value:
      url: /paymentlink
      method: POST
      parameters:
        - "title (string, required) — name/title of the payment link"
        - "currency (string, required) — USD, NGN, GHS, KES, ZAR"
        - "amount (number, required) — minor units (e.g. 300 NGN = 30000)"
        - "isFixedAmount (boolean, required) — true = exact amount; false = donation mode"
        - "type (string, required) — must be 'easy'"
        - "purpose (string, optional) — description on merchant dashboard"
      response_schema: '{"success": true, "data": {"paymentLink": {"link": "string", "code": "string", "merchantId": "string", "amount": "number", "currency": "string", "active": "boolean"}}}'
      description: "Create a shareable payment link. Supports fixed and donation amounts. Currencies: USD, NGN, GHS, KES, ZAR."
    confidence_score: 0.95
    source: official_docs
    verification_date: "2026-03-10T00:00:00Z"
    decay_rate: 0.05

  # === RECURRING CHARGE (Re-charge Card) ===
  - value:
      url: /transaction/recurrent
      method: POST
      parameters:
        - "authorizationCode (string, required) — from initial transaction webhook or status endpoint"
        - "amount (number, required) — in original card currency minor units"
        - "reference (string, required) — unique reference for this charge"
      response_schema: '{"success": true, "message": "transaction", "data": "processing"}'
      description: "Charge a previously authorized card. Requires successful first charge via initialize endpoint. Min first charge: NGN 50.00 / GHS 0.10. Contact Startbutton team for feature activation. Webhook includes isRecurrent: true."
    confidence_score: 0.90
    source: official_docs
    verification_date: "2026-03-10T00:00:00Z"
    decay_rate: 0.05

  # === COLLECTION (Initialize) ===
  - value:
      url: /transaction/collection
      method: POST
      parameters:
        - "amount (number, required) — collection amount in minor units"
        - "currency (string, required) — NGN, GHS, KES, UGX, ZAR, RWF, TZS, XOF"
        - "reference (string, optional) — unique transaction reference"
        - "webhookUrl (string, optional) — custom webhook URL for this collection"
      response_schema: '{"success": true, "message": "string", "data": "processing"}'
      description: "Initialize a collection (inbound payment). Supports bank transfer and mobile money across supported currencies. Server-to-server integration."
    confidence_score: 0.75
    source: inferred
    verification_date: "2026-03-10T00:00:00Z"
    decay_rate: 0.10

  # === Existing endpoints (kept for backward compat) ===
  - value:
      url: /payments
      method: POST
      parameters:
        - amount
        - currency
        - merchant_reference
        - payment_method
        - return_url
      response_schema: '{"id": "string", "status": "string", "amount": "integer", "currency": "string", "created_at": "string"}'
      description: Create a new payment transaction (card payments via checkout flow)
    confidence_score: 0.85
    source: sandbox_test
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      url: /payments/{id}
      method: GET
      parameters:
        - id
      response_schema: '{"id": "string", "status": "string", "amount": "integer", "currency": "string", "events": "array"}'
      description: Retrieve payment details by ID
    confidence_score: 0.85
    source: sandbox_test
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      url: /payments/{id}/capture
      method: POST
      parameters:
        - id
        - amount
      response_schema: '{"id": "string", "status": "string", "captured_amount": "integer"}'
      description: Capture a previously authorized payment
    confidence_score: 0.90
    source: official_docs
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      url: /payments/{id}/refund
      method: POST
      parameters:
        - id
        - amount
        - reason
      response_schema: '{"id": "string", "refund_id": "string", "status": "string", "amount": "integer"}'
      description: Refund a captured payment (full or partial)
    confidence_score: 0.90
    source: official_docs
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      url: /payments/{id}/void
      method: POST
      parameters:
        - id
      response_schema: '{"id": "string", "status": "string"}'
      description: Void an authorized payment before capture
    confidence_score: 0.85
    source: official_docs
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      url: /payments/{id}/3ds
      method: POST
      parameters:
        - id
        - browser_info
      response_schema: '{"redirect_url": "string", "session_id": "string"}'
      description: Initiate 3D Secure authentication flow
    confidence_score: 0.78
    source: community_report
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.10

  - value:
      url: /webhooks
      method: POST
      parameters:
        - url
        - events
      response_schema: '{"id": "string", "url": "string", "events": "array", "active": "boolean"}'
      description: Register a webhook endpoint for event notifications
    confidence_score: 0.85
    source: official_docs
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

webhooks:
  - value:
      event_name: collection.completed
      payload_schema: '{"event": "collection.completed", "data": {"merchantId": "string", "paymentPartner": "string", "transactionReference": "string", "userTransactionReference": "string", "status": "string", "amount": "number", "currency": "string", "feeAmount": "number", "customerEmail": "string", "authorizationCode": "string", "isRecurrent": "boolean", "paymentCode": "string", "createdAt": "ISO8601"}}'
      trigger_conditions: When a collection (inbound payment) completes successfully
      description: "Primary collection webhook. Contains authorizationCode for subsequent recurring charges. Store this code for re-charge flow."
    confidence_score: 0.92
    source: official_docs
    verification_date: "2026-03-10T00:00:00Z"
    decay_rate: 0.05

  - value:
      event_name: transfer.successful
      payload_schema: '{"event": "transfer.successful", "data": {"transactionReference": "string", "userTransactionReference": "string", "status": "Successful", "amount": "number", "currency": "string", "recipient": {"recipientName": "string", "currency": "string", "institutionType": "string", "institutionName": "string"}}}'
      trigger_conditions: When a transfer/payout completes successfully
      description: "Fired when funds are successfully delivered to recipient. Final status for offramp leg."
    confidence_score: 0.90
    source: official_docs
    verification_date: "2026-03-10T00:00:00Z"
    decay_rate: 0.05

  - value:
      event_name: transfer.failed
      payload_schema: '{"event": "transfer.failed", "data": {"transactionReference": "string", "status": "Failed", "amount": "number", "currency": "string", "reason": "string"}}'
      trigger_conditions: When a transfer/payout fails
      description: Transfer could not be processed. Check reason field.
    confidence_score: 0.90
    source: official_docs
    verification_date: "2026-03-10T00:00:00Z"
    decay_rate: 0.05

  - value:
      event_name: transfer.reversed
      payload_schema: '{"event": "transfer.reversed", "data": {"transactionReference": "string", "status": "Reversed", "amount": "number", "currency": "string", "reason": "string"}}'
      trigger_conditions: When a transfer is reversed by bank/operator
      description: "Funds reversed by bank or mobile money operator. Funds automatically refunded to merchant wallet."
    confidence_score: 0.90
    source: official_docs
    verification_date: "2026-03-10T00:00:00Z"
    decay_rate: 0.05

  - value:
      event_name: payment.authorized
      payload_schema: '{"event": "string", "data": {"id": "string", "status": "authorized", "amount": "integer", "currency": "string"}}'
      trigger_conditions: When a payment is successfully authorized
      description: Fired when payment authorization succeeds
    confidence_score: 0.95
    source: sandbox_test
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      event_name: payment.captured
      payload_schema: '{"event": "string", "data": {"id": "string", "status": "captured", "amount": "integer", "captured_amount": "integer"}}'
      trigger_conditions: When a payment capture is completed
      description: Fired when payment is successfully captured
    confidence_score: 0.95
    source: sandbox_test
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      event_name: payment.refunded
      payload_schema: '{"event": "string", "data": {"id": "string", "status": "refunded", "refund_id": "string", "amount": "integer"}}'
      trigger_conditions: When a refund is processed
      description: Fired when payment refund completes
    confidence_score: 0.90
    source: official_docs
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      event_name: payment.voided
      payload_schema: '{"event": "string", "data": {"id": "string", "status": "voided"}}'
      trigger_conditions: When a payment void is processed
      description: Fired when authorized payment is voided
    confidence_score: 0.85
    source: official_docs
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      event_name: payment.failed
      payload_schema: '{"event": "string", "data": {"id": "string", "status": "failed", "error_code": "string", "error_message": "string"}}'
      trigger_conditions: When a payment operation fails
      description: Fired when any payment operation fails
    confidence_score: 0.90
    source: official_docs
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

  - value:
      event_name: payment.3ds_completed
      payload_schema: '{"event": "string", "data": {"id": "string", "status": "string", "auth_result": "string"}}'
      trigger_conditions: When 3DS authentication completes (success or failure)
      description: Fired when 3D Secure flow completes
    confidence_score: 0.72
    source: community_report
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.10

  - value:
      event_name: payment.expired
      payload_schema: '{"event": "string", "data": {"id": "string", "status": "expired"}}'
      trigger_conditions: When a payment authorization expires without capture
      description: Fired when payment reaches timeout threshold
    confidence_score: 0.75
    source: inferred
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.10

  - value:
      event_name: payment.reversed
      payload_schema: '{"event": "string", "data": {"id": "string", "status": "reversed", "reason": "string"}}'
      trigger_conditions: Discovered via sandbox testing — not in official docs
      description: Fired for provider-initiated reversals (discovered in sandbox, not in official docs)
    confidence_score: 0.95
    source: sandbox_test
    verification_date: "2026-03-06T00:00:00Z"
    decay_rate: 0.05

