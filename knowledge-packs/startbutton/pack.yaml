    source: official_docs
    verification_date: "2026-03-10T00:00:00Z"
    decay_rate: 0.05

  - value:
      code: INVALID_REFERENCE
      description: "Reference must be 16-100 alphanumeric characters"
      recovery_action: "Generate a reference string between 16 and 100 alphanumeric characters"
    confidence_score: 0.95
    source: official_docs
    verification_date: "2026-03-10T00:00:00Z"
    decay_rate: 0.05

  - value:
      code: CARD_EXPIRED
